databases:
  - name: library-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: library-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/config/migrate.js && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: library-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: CLIENT_URL
        sync: false # set after first deploy to your frontend's onrender.com URL

  - type: web
    name: library-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # set after first deploy to https://<library-backend>.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
